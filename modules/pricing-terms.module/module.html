{% set module_id = name %}

<section class="pricing-terms-{{ module_id }} max-w-4xl mx-auto px-6 mb-24 bg-background-alt-light dark:bg-background-alt-dark js-dark-alt py-12 rounded-[2rem]">
  <div class="bg-[#1e1e1e] rounded-2xl overflow-hidden shadow-2xl border border-white/5">

    {# Terminal Title Bar #}
    <div class="bg-[#2d2d2d] px-5 py-3 flex items-center gap-2">
      <div class="flex gap-1.5">
        <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
        <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
      </div>
      <span class="text-xs font-mono text-white/40 ml-4 lowercase tracking-wider">
        {{ module.content.terminal_title }}
      </span>
    </div>

    {# Terminal Body #}
    <div class="p-8 font-mono text-sm leading-relaxed text-brand-lime/80">
      {% for section in module.content.sections %}
        <p class="mb-4 text-accent-contrast font-bold">{{ section.section_heading }}</p>
        <div class="{% if not loop.last %}mb-6{% endif %} {% if loop.last %}opacity-60{% endif %}">
          {{ section.section_body }}
        </div>
      {% endfor %}
    </div>

  </div>
</section>
