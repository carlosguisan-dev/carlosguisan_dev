{# Services Problem Module #}
{% require_css %}
<style>
  {% scope_css %}
    .services-problem-{{ module_id }} {
      {{ module.styles.spacing.css }}
    }
  {% end_scope_css %}
</style>
{% end_require_css %}

<section class="services-problem-{{ module_id }} bg-background-light dark:bg-background-dark border-t border-slate-100 dark:border-white/5">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-24 items-center">
      
      {# Left Column - Title #}
      <div class="lg:col-span-5">
        <h2 class="text-4xl md:text-5xl font-bold text-slate-900 dark:text-slate-100 leading-tight">
          {{ module.content.title }}
        </h2>
      </div>

      {# Right Column - Content #}
      <div class="lg:col-span-7">
        <div class="text-lg text-slate-600 dark:text-slate-400 mb-10 leading-relaxed">
          {{ module.content.description }}
        </div>
        
        <div class="flex items-center gap-8 text-brand-lime">
          <span class="material-symbols-outlined text-4xl opacity-80">{{ module.content.icon_1 }}</span>
          <span class="material-symbols-outlined text-4xl opacity-80">{{ module.content.icon_2 }}</span>
          <span class="material-symbols-outlined text-4xl opacity-80">{{ module.content.icon_3 }}</span>
        </div>
      </div>

    </div>
  </div>
</section>
