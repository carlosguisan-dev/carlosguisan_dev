{% set module_id = name %}

<section class="services-requirements-{{ module_id }} max-w-7xl mx-auto px-6 mb-24 bg-background-alt-light dark:bg-background-alt-dark js-dark-alt py-12 rounded-[2rem]">
  <div class="bg-brand-green/5 dark:bg-white/5 border border-brand-green/10 dark:border-white/10 rounded-[2rem] p-8 md:p-12">
    
    <div class="max-w-4xl mb-12 mx-auto text-center">
      <h3 class="text-2xl font-bold text-brand-green dark:text-white mb-4">
        {{ module.title }}
      </h3>
      <p class="text-brand-green/70 dark:text-slate-300 leading-relaxed max-w-2xl mx-auto">
        {{ module.description }}
      </p>
    </div>

    <div class="space-y-8">
      {% for item in module.items %}
        <div class="flex flex-col md:flex-row md:items-start gap-2 md:gap-8 pb-8 {% if not loop.last %}border-bottom border-brand-green/5 dark:border-white/5{% endif %}">
          <div class="md:w-1/3 shrink-0">
            <span class="font-mono text-xs font-bold tracking-widest text-brand-green dark:text-accent-contrast uppercase">
              {{ item.item_label }}
            </span>
          </div>
          <div class="md:w-2/3">
            <p class="text-brand-green/80 dark:text-slate-400 text-sm leading-relaxed">
              {{ item.content }}
            </p>
          </div>
        </div>
      {% endfor %}
    </div>

    {% if module.note %}
      <div class="mt-8 pt-8 border-t border-brand-green/10 dark:border-white/10">
        <p class="text-xs italic text-brand-green/60 dark:text-white/40">
          {{ module.note }}
        </p>
      </div>
    {% endif %}

  </div>
</section>

{% require_css %}
<style>
  .services-requirements-{{ module_id }} .border-bottom {
    border-bottom-width: 1px;
  }
</style>
{% end_require_css %}
