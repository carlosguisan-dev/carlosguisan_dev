{% set module_id = name %}
{% require_css %}
<style>
  {% scope_css %}
    .about-philosophy-{{ module_id }} {
      {{ module.styles.spacing.css }}
    }
  {% end_scope_css %}
</style>
{% end_require_css %}

<section class="about-philosophy-{{ module_id }} py-20 bg-background-alt-light dark:bg-background-alt-dark border-y border-accent/10 js-dark-alt">
  <div class="max-w-4xl mx-auto px-6 text-center">
    {% if module.content.title %}
      <h2 class="text-primary dark:text-white text-3xl md:text-4xl font-bold mb-8">
        {{ module.content.title }}
      </h2>
    {% endif %}
    
    <div class="text-lg md:text-xl text-brand-green/90 dark:text-slate-200/90 leading-relaxed font-light [&_b]:font-bold [&_strong]:font-bold [&_b]:text-primary [&_strong]:text-primary dark:[&_b]:text-white dark:[&_strong]:text-white">
      {% inline_rich_text field="content.text", value="{{ module.content.text }}" %}
    </div>
  </div>
</section>
