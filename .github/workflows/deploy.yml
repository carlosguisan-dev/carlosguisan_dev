name: Deploy to HubSpot

on:
  push:
    branches:
      - master # Cambiado de main a master basándose en el repositorio actual

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli@latest
      - name: Deploy to HubSpot
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          HUBSPOT_ACCOUNT_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          hs cms upload . "Carlosguisan Showcase" --use-env
