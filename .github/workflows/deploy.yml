name: HubSpot Deploy Theme

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to HubSpot
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli@latest

      - name: Deploy to HubSpot
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_ACCOUNT_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          hs cms upload . carlosguisan_dev --use-env
